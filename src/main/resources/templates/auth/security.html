<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Matrix - Centro de Seguridad</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="matrix-dashboard">
<!-- Contenedor general centrado (sin interferir con el position:fixed del login) -->
<!-- 1. Forzamos que el cuerpo de la página elimine márgenes y use el fondo oscuro original -->
<body class="matrix-dashboard" style="margin: 0; padding: 0; background-color: #0f172a !important; min-height: 100vh;">

<!-- 2. Forzamos de manera absoluta que este contenedor ocupe todo el ancho y centre la caja -->
<div class="security-page-wrapper" style="
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    width: 100vw !important;
    min-height: calc(100vh - 70px);
    background-color: #0f172a !important;
    box-sizing: border-box;
    padding: 40px 20px;
">

    <!-- 3. Forzamos a la caja del login a romper cualquier posición fija o flotado a la izquierda -->
    <div class="matrix-login-box" style="
        position: relative !important;
        top: auto !important;
        left: auto !important;
        margin: 0 auto !important;
        transform: none !important;
    ">
        <!-- Línea de escaneo animada original -->
        <div class="scan-line"></div>

        <!-- Puntos decorativos de la terminal -->
        <div class="terminal-header">
            <div class="terminal-dot red"></div>
            <div class="terminal-dot yellow"></div>
            <div class="terminal-dot green"></div>
        </div>

        <!-- Encabezado -->
        <div class="matrix-header">
            <h1 class="glitch" data-text="SEGURIDAD">[SEGURIDAD]</h1>
            <p class="terminal-text" style="font-size: 11px;">USUARIO: <span th:text="${session.userSession}">prebacorreo@example.com</span></p>
        </div>

        <!-- ================= FORMULARIO 01: CONTRASEÑA ================= -->
        <form th:action="@{/profile/update-password}" method="POST" class="matrix-form" style="margin-bottom: 30px;">
            <div class="matrix-input-group">
                <label class="matrix-label">
                    <span class="bracket">[</span>01. LLAVE TRADICIONAL<span class="bracket">]</span>
                </label>
                <p class="terminal-text-small" style="margin-bottom: 5px;">Establece una contraseña estándar de respaldo.</p>
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="password" name="nuevaContrasena" class="matrix-input" placeholder="NUEVA CONTRASEÑA" required autocomplete="off">
                </div>
            </div>

            <div class="matrix-input-group">
                <div class="input-wrapper">
                    <span class="input-prefix">$</span>
                    <input type="password" name="confirmarContrasena" class="matrix-input" placeholder="CONFIRMAR CONTRASEÑA" required autocomplete="off">
                </div>
            </div>

            <button type="submit" class="matrix-btn">
                <span class="btn-text">ACTUALIZAR PASSWORD</span>
                <div class="btn-glow"></div>
            </button>
        </form>

        <!-- Divisor estético estilo terminal -->
        <div style="border-top: 1px dashed #00ff41; margin: 25px 0; opacity: 0.5;"></div>

        <!-- ================= SECCIÓN 02: BIOMETRÍA ================= -->
        <div class="matrix-form">
            <div class="matrix-input-group">
                <label class="matrix-label">
                    <span class="bracket">[</span>02. ACCESO BIOMÉTRICO<span class="bracket">]</span>
                </label>
                <p class="terminal-text-small" style="margin-bottom: 12px;">Enlaza la huella dactilar o FaceID de este dispositivo.</p>

                <p class="terminal-text" style="font-size: 11px; margin-bottom: 15px; text-align: center;">
                    ESTADO: <span style="color: #00ffff; text-shadow: 0 0 5px #00ffff;">MÓDULO LISTO</span>
                </p>
            </div>

            <input type="hidden" id="userNameLogged" th:value="${session.userName}">
            <input type="hidden" id="userEmailLogged" th:value="${session.userSession}">

            <button id="btnRegisterNewFingerprint" type="button" class="matrix-btn" style="background: linear-gradient(45deg, #00ff41, #00ffff); color: #0f172a;">
                <span class="btn-text">VINCULAR LLAVE BIOMÉTRICA</span>
                <div class="btn-glow"></div>
            </button>
        </div>

        <!-- Footer interno de la caja -->
        <div class="matrix-footer" style="margin-top: 25px; padding-top: 10px;">
            <p class="terminal-text-small">SISTEMA PROTEGIDO CON CIFRADO ART-STEGO</p>
        </div>
    </div>
</div>

<script type="module">
    import { registerCredential } from '/js/WebAuth.js';

    document.getElementById('btnRegisterNewFingerprint').addEventListener('click', async () => {
        const email = document.getElementById('userEmailLogged').value;
        const nombre = document.getElementById('userNameLogged').value;

        try {
            // Invocamos el utilitario criptográfico que ya reparamos y funciona
            const resultado = await registerCredential(email, nombre);
            if(resultado.success) {
                alert("¡Éxito! Tu huella dactilar ha sido enlazada correctamente a tu perfil.");
            }
        } catch (err) {
            alert("Error al vincular el hardware: " + err.message);
        }
    });
</script>
</body>
</html>
