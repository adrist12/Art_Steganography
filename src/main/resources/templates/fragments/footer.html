<!-- fragments/navbar.html                                        -->
<!-- No usa layout:decorate — NO es una página completa          -->
<!-- Es solo una pieza, como un componente                       -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<footer th:fragment="footer">

    <img class="footer_img"
         th:src="@{/images/logo.jpg}"
         alt="Logo Artsega">

    <p>
        &copy;
        <!-- Opción A — con #temporals (Thymeleaf 3+)             -->
        <span th:text="${#temporals.year(#temporals.createNow())}">2026</span>
        Artsega. Todos los derechos reservados.
    </p>

</footer>

</body>
</html>
